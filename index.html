<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>AI 助教 - Gemini 3.1 Pro</title>
    <style>
        :root { --google-blue: #4285f4; --bg-gray: #f8f9fa; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; background: var(--bg-gray); display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        #login-box { background: white; padding: 2.5rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        input[type="text"] { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        
        #chat-ui { display: none; width: 100vw; height: 100vh; flex-direction: column; background: white; }
        #messages { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 15px; background: #f1f3f4; }
        
        .msg { max-width: 80%; padding: 14px 18px; border-radius: 18px; line-height: 1.6; font-size: 16px; }
        .user { align-self: flex-end; background: var(--google-blue); color: white; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: white; color: #202124; border: 1px solid #dadce0; border-bottom-left-radius: 2px; }

        .input-bar { border-top: 1px solid #eee; padding: 20px; display: flex; gap: 12px; }
        #user-in { flex: 1; padding: 12px 20px; border: 1px solid #dfe1e5; border-radius: 30px; outline: none; }
        
        button { padding: 10px 25px; background: var(--google-blue); color: white; border: none; border-radius: 30px; cursor: pointer; font-weight: 600; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #loading-info { font-size: 13px; color: #5f6368; margin: 10px 0; }
    </style>
</head>
<body>

    <div id="login-box">
        <h2 style="color: var(--google-blue);">Professor Juichun</h2>
        <p style="color: #5f6368;">AI 助教系統 (Gemini 3.1 Pro)</p>
        <input type="text" id="stu-name" placeholder="請輸入學號與姓名">
        <div id="loading-info">正在準備 PDF 講義資料...</div>
        <button id="start-btn" onclick="enterApp()" disabled style="width: 100%;">開始對話</button>
    </div>

    <div id="chat-ui">
        <div id="messages"></div>
        <div class="input-bar">
            <input type="text" id="user-in" placeholder="詢問關於講義的問題..." onkeypress="if(event.key==='Enter') send()">
            <button id="send-btn" onclick="send()">發送</button>
        </div>
    </div>

    <script type="importmap">
      { "imports": { "@google/generative-ai": "https://esm.run/@google/generative-ai" } }
    </script>
    <script type="module">
        import { GoogleGenerativeAI } from "@google/generative-ai";

        // --- 使用者配置 ---
        const API_KEY = "AIzaSyDy0mSgK5K6dAwj-dfbqxzYy8Ad4oX20Uc"; 
        const PDF_FILENAME = "syllabus.pdf"; 
        // ----------------

        const genAI = new GoogleGenerativeAI(API_KEY);
        let chat;
        let pdfPart = null;

        // 將 PDF 抓取並轉換為 Gemini 的 inlineData 格式
        async function preparePdf() {
            try {
                const response = await fetch(PDF_FILENAME);
                if (!response.ok) throw new Error("找不到 PDF 檔案");
                const blob = await response.blob();
                const base64 = await new Promise(resolve => {
                    const reader = new FileReader();
                    reader.onloadend = () => resolve(reader.result.split(',')[1]);
                    reader.readAsDataURL(blob);
                });
                
                pdfPart = { inlineData: { data: base64, mimeType: "application/pdf" } };
                document.getElementById('loading-info').innerText = "講義同步成功 ✅";
                document.getElementById('start-btn').disabled = false;
            } catch (err) {
                document.getElementById('loading-info').innerText = "❌ 錯誤：無法載入 " + PDF_FILENAME;
                console.error(err);
            }
        }
        preparePdf();

        window.enterApp = () => {
            const name = document.getElementById('stu-name').value.trim();
            if (!name) return alert("請輸入資訊以開始。");

            document.getElementById('login-box').style.display = 'none';
            document.getElementById('chat-ui').style.display = 'flex';

            // 實例化 Gemini 3.1 Pro
            const model = genAI.getGenerativeModel({ 
                model: "gemini-3.1-pro-preview", 
                systemInstruction: `你是一位教學助理。學生的姓名是 ${name}。
                你已接收到一份 PDF 講義。請嚴格根據講義內容提供專業、有禮貌的解答。
                若講義未提及相關內容，請引導學生查閱課程資料。請使用繁體中文回答。`
            });

            // 初始化對話並夾帶 PDF 資訊
            chat = model.startChat({
                history: [
                    {
                        role: "user",
                        parts: [pdfPart, { text: "這是本學期的課程講義 PDF，請學習其中的內容。" }]
                    },
                    {
                        role: "model",
                        parts: [{ text: "你好 " + name + "！我已經準備好針對這份講義為你解答了。請問今天有什麼我可以幫你的嗎？" }]
                    }
                ]
            });
            
            addMessage("ai", `你好 ${name}！我已經讀完 PDF 講義了。請問有什麼問題？`);
        };

        window.send = async () => {
            const inputField = document.getElementById('user-in');
            const btn = document.getElementById('send-btn');
            const text = inputField.value.trim();
            
            if (!text || btn.disabled) return;

            addMessage("user", text);
            inputField.value = "";
            btn.disabled = true;

            try {
                const result = await chat.sendMessage(text);
                addMessage("ai", result.response.text());
            } catch (error) {
                addMessage("ai", "發生連線錯誤：" + error.message);
            } finally {
                btn.disabled = false;
            }
        };

        function addMessage(role, text) {
            const container = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = `msg ${role}`;
            div.innerText = text;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }
    </script>
</body>
</html>
