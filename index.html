<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>AI 助教 - Gemini 3.1</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --google-blue: #4285f4; --bg-gray: #f8f9fa; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; background: var(--bg-gray); display: flex; justify-content: center; align-items: center; height: 100vh; }
        #login-box { background: white; padding: 2.5rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        input[type="text"] { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        #chat-ui { display: none; width: 100vw; height: 100vh; flex-direction: column; background: white; }
        #messages { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 15px; background: #f1f3f4; }
        
        .msg { 
            max-width: 85%; 
            padding: 14px 18px; 
            border-radius: 18px; 
            line-height: 1.6; 
            font-size: 16px; 
            position: relative;
            word-wrap: break-word; 
        }
        .user { align-self: flex-end; background: var(--google-blue); color: white; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: white; color: #202124; border: 1px solid #dadce0; border-bottom-left-radius: 2px; padding-bottom: 35px; }
        
        /* Markdown 內容樣式 */
        .msg.ai p { margin: 0 0 10px 0; }
        .msg.ai ul, .msg.ai ol { padding-left: 20px; margin: 10px 0; }
        .msg.ai code { background: #eee; padding: 2px 4px; border-radius: 4px; font-family: monospace; }
        .msg.ai pre { background: #202124; color: #fff; padding: 15px; border-radius: 8px; overflow-x: auto; margin: 10px 0; }
        
        /* 複製按鈕樣式 */
        .copy-btn {
            position: absolute;
            bottom: 8px;
            right: 12px;
            background: transparent;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 14px;
            padding: 5px;
            transition: color 0.2s;
        }
        .copy-btn:hover { color: var(--google-blue); }

        .input-bar { border-top: 1px solid #eee; padding: 20px; display: flex; gap: 12px; }
        #user-in { flex: 1; padding: 12px 20px; border: 1px solid #dfe1e5; border-radius: 30px; outline: none; }
        button { padding: 10px 25px; background: var(--google-blue); color: white; border: none; border-radius: 30px; cursor: pointer; font-weight: 600; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #loading-info { font-size: 13px; color: #5f6368; margin: 10px 0; }
        
        /* 正在輸入動畫 */
        .typing { display: flex; gap: 4px; align-items: center; min-height: 24px; width: fit-content; }
        .dot { width: 6px; height: 6px; background: #5f6368; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1.0); } }
    </style>
</head>
<body>

    <div id="login-box">
        <h2 style="color: var(--google-blue);">Professor Juichun</h2>
        <p style="color: #5f6368;">課程 AI 助教系統</p>
        <input type="text" id="stu-name" placeholder="請輸入學號與姓名">
        <div id="loading-info">正在準備課程大綱 (syllabus.pdf)...</div>
        <button id="start-btn" onclick="enterApp()" disabled style="width: 100%;">進入教室</button>
    </div>

    <div id="chat-ui">
        <div id="messages"></div>
        <div class="input-bar">
            <input type="text" id="user-in" placeholder="詢問關於課程或大綱的問題..." onkeypress="if(event.key==='Enter') send()">
            <button id="send-btn" onclick="send()">發送</button>
        </div>
    </div>

    <script type="importmap">
      { "imports": { "@google/generative-ai": "https://esm.run/@google/generative-ai" } }
    </script>
    <script type="module">
        import { GoogleGenerativeAI } from "@google/generative-ai";

        const p1 = "AIzaSyBPv6lHbT97fs"; 
        const p2 = "fIra7gwNZUw0PiNbAsfP0";
        const API_KEY = p1 + p2;
        const PDF_FILENAME = "syllabus.pdf";

        const genAI = new GoogleGenerativeAI(API_KEY);
        let chat;
        let pdfPart = null;

        async function preparePdf() {
            try {
                const response = await fetch(PDF_FILENAME);
                if (!response.ok) throw new Error();
                const blob = await response.blob();
                const base64 = await new Promise(resolve => {
                    const reader = new FileReader();
                    reader.onloadend = () => resolve(reader.result.split(',')[1]);
                    reader.readAsDataURL(blob);
                });
                pdfPart = { inlineData: { data: base64, mimeType: "application/pdf" } };
                document.getElementById('loading-info').innerText = "課程大綱載入完成 ✅";
                document.getElementById('start-btn').disabled = false;
            } catch (err) {
                document.getElementById('loading-info').innerText = "❌ 錯誤：無法讀取 " + PDF_FILENAME;
            }
        }
        preparePdf();

        window.enterApp = () => {
            const name = document.getElementById('stu-name').value.trim();
            if (!name) return alert("請輸入姓名");
        
            document.getElementById('login-box').style.display = 'none';
            document.getElementById('chat-ui').style.display = 'flex';
        
            const model = genAI.getGenerativeModel({ 
                model: "gemini-3.1-flash-lite-preview", 
                tools: [{ googleSearch: {} }], 
                systemInstruction: `你是一位專業的教學助理。學生姓名是 ${name}。
                你擁有這份課程大綱 (syllabus.pdf) 作為核心參考。
                【任務指令】：
                1. 課程行政問題：如評分、時間、大綱內容，請嚴格根據 PDF 回答。
                2. 學術擴充問題：若學生詢問課程相關學術概念（如「質性研究」），請務必使用 Google 搜尋工具提供資料並標註來源。
                3. 婉拒無關問題：若學生詢問與學習無關的生活雜事，請禮貌婉拒。
                請務必使用繁體中文回答。`
            });
        
            chat = model.startChat({
                history: [
                    { role: "user", parts: [pdfPart, { text: "這是本學期的課程大綱，請讀取並準備回答問題。" }] },
                    { role: "model", parts: [{ text: "你好 " + name + "！我已讀完課程大綱。我可以協助你查詢課綱資訊或進行學術研究。請問今天想討論什麼？" }] }
                ]
            });
            addMessage("ai", `你好 ${name}！我準備好了。除了課綱問題，如果你有想深入研究的學術主題，我也可以幫你搜尋文獻喔！`);
        };

        window.send = async () => {
            const inputField = document.getElementById('user-in');
            const btn = document.getElementById('send-btn');
            const text = inputField.value.trim();
            if (!text || btn.disabled) return;
        
            addMessage("user", text);
            inputField.value = "";
            btn.disabled = true;
            showTypingIndicator();
            const startTime = Date.now();
        
            try {
                let history = await chat.getHistory();
                if (history.length > 12) {
                    const initialContext = history.slice(0, 2);
                    const recentContext = history.slice(-10);
                    chat.history = [...initialContext, ...recentContext];
                }

                const result = await chat.sendMessage(text);
                const responseText = result.response.text();
        
                const elapsed = Date.now() - startTime;
                const delay = Math.max(0, 1000 - elapsed);
                
                setTimeout(() => {
                    removeTypingIndicator();
                    typeMessage("ai", responseText);
                }, delay);
        
            } catch (error) {
                removeTypingIndicator();
                addMessage("ai", "連線錯誤：" + error.message);
            } finally {
                setTimeout(() => { btn.disabled = false; }, 1000);
            }
        };
        
        function typeMessage(role, text) {
            const container = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = `msg ${role}`;
            container.appendChild(div);
            
            let i = 0;
            const speed = 15; 
            let currentText = "";
            
            function type() {
                if (i < text.length) {
                    currentText += text.charAt(i);
                    div.innerHTML = marked.parse(currentText);
                    i++;
                    container.scrollTop = container.scrollHeight;
                    setTimeout(type, speed);
                } else if (role === 'ai') {
                    addCopyButton(div, text);
                }
            }
            type();
        }

        function addCopyButton(element, text) {
            const btn = document.createElement('button');
            btn.className = 'copy-btn';
            btn.innerHTML = '<i class="far fa-copy"></i>';
            btn.onclick = () => {
                navigator.clipboard.writeText(text);
                btn.innerHTML = '<i class="fas fa-check"></i>';
                setTimeout(() => { btn.innerHTML = '<i class="far fa-copy"></i>'; }, 2000);
            };
            element.appendChild(btn);
        }
        
        function addMessage(role, text) {
            const container = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = `msg ${role}`;
            div.innerText = text;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function showTypingIndicator() {
            const container = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = 'msg ai';
            div.id = 'typing-indicator';
            div.innerHTML = `<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }
        
        function removeTypingIndicator() {
            const indicator = document.getElementById('typing-indicator');
            if (indicator) indicator.remove();
        }        
    </script>
</body>
</html>
