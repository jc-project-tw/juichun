<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professor Juichun - AI 助教</title>
    
    <script defer src="https://www.gstatic.com/ces-console/fast/chat-messenger/prod/v1.15/chat-messenger.js"></script>
    <link rel="stylesheet" href="https://www.gstatic.com/ces-console/fast/chat-messenger/prod/v1.15/themes/chat-messenger-default.css">
    <link rel="stylesheet" href="https://www.gstatic.com/ces-console/fast/chat-messenger/prod/v1.15/themes/chat-messenger-layout.css">

    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f4f7f6; }
        #login-container { text-align: center; background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input { padding: 10px; width: 200px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 4px; }
        button { padding: 10px 20px; background-color: #4285f4; color: white; border: none; border-radius: 4px; cursor: pointer; }
        #chat-interface { display: none; width: 100%; height: 100vh; }
    </style>
</head>
<body>

    <div id="login-container">
        <h2>歡迎來到課程 AI 助教</h2>
        <p>請輸入您的學號與姓名以開始對話</p>
        <input type="text" id="student-info" placeholder="例如：B12345678 王小明"><br>
        <button onclick="startChat()">開始互動</button>
    </div>

    <div id="chat-interface">
        <chat-messenger url-allowlist="*">
            <chat-messenger-container chat-title="Professor Juichun" enable-file-upload>
                <chat-reset-session-button slot="titlebar-actions" title-text="Start new chat"></chat-reset-session-button>
            </chat-messenger-container>
        </chat-messenger>
    </div>

    <script>
        let studentInfo = "";
    
        // 1. 預先定義初始化邏輯
        function initAgent() {
            if (typeof chatSdk !== 'undefined') {
                const context = chatSdk.prebuilts.ces.createContext({
                    deploymentName: "projects/512548635446/locations/us/apps/b67c60af-51cd-43d7-8b5e-767d0665597f/deployments/802e7f50-ddcf-4f92-bfd4-569611c6840b",
                    tokenBroker: {
                        enableTokenBroker: false,
                        apiKey: "AIzaSyDy0mSgK5K6dAwj-dfbqxzYy8Ad4oX20Uc",
                        enableRecaptcha: false
                    }
                });
                chatSdk.registerContext(context);
                
                // 延遲發送身分訊息
                setTimeout(() => {
                    if (studentInfo) {
                        chatSdk.sendMessage(`我是 ${studentInfo}，我準備好開始互動了。`);
                    }
                }, 2000);
            }
        }
    
        // 2. 監聽載入事件
        window.addEventListener("chat-messenger-loaded", initAgent);
    
        function startChat() {
            const info = document.getElementById('student-info').value;
            if (!info) return alert("請輸入資訊！");
            
            studentInfo = info;
            
            // 顯示界面
            document.getElementById('login-container').style.display = 'none';
            document.getElementById('chat-interface').style.display = 'block';
    
            // 如果 SDK 已經載入好了但事件沒觸發，手動跑一次
            if (typeof chatSdk !== 'undefined') {
                initAgent();
            }
        }
    </script>
</body>
</html>
