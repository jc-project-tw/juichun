<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>AI 助教 - Gemini 3.1 Pro</title>
    <style>
        :root { --google-blue: #4285f4; --bg-gray: #f8f9fa; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; background: var(--bg-gray); display: flex; justify-content: center; align-items: center; height: 100vh; }
        #login-box { background: white; padding: 2.5rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        input[type="text"] { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        #chat-ui { display: none; width: 100vw; height: 100vh; flex-direction: column; background: white; }
        #messages { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 15px; background: #f1f3f4; }
        .msg { max-width: 80%; padding: 14px 18px; border-radius: 18px; line-height: 1.6; font-size: 16px; }
        .user { align-self: flex-end; background: var(--google-blue); color: white; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: white; color: #202124; border: 1px solid #dadce0; border-bottom-left-radius: 2px; }
        .input-bar { border-top: 1px solid #eee; padding: 20px; display: flex; gap: 12px; }
        #user-in { flex: 1; padding: 12px 20px; border: 1px solid #dfe1e5; border-radius: 30px; outline: none; }
        button { padding: 10px 25px; background: var(--google-blue); color: white; border: none; border-radius: 30px; cursor: pointer; font-weight: 600; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #loading-info { font-size: 13px; color: #5f6368; margin: 10px 0; }
    </style>
</head>
<body>

    <div id="login-box">
        <h2 style="color: var(--google-blue);">Professor Juichun</h2>
        <p style="color: #5f6368;">課程 AI 助教系統</p>
        <input type="text" id="stu-name" placeholder="請輸入學號與姓名">
        <div id="loading-info">正在準備課程大綱 (syllabus.pdf)...</div>
        <button id="start-btn" onclick="enterApp()" disabled style="width: 100%;">進入教室</button>
    </div>

    <div id="chat-ui">
        <div id="messages"></div>
        <div class="input-bar">
            <input type="text" id="user-in" placeholder="詢問關於課程或大綱的問題..." onkeypress="if(event.key==='Enter') send()">
            <button id="send-btn" onclick="send()">發送</button>
        </div>
    </div>

    <script type="importmap">
      { "imports": { "@google/generative-ai": "https://esm.run/@google/generative-ai" } }
    </script>
    <script type="module">
        import { GoogleGenerativeAI } from "@google/generative-ai";

        // --- 防偵測 API Key 拼接 ---
        // 請將你的新 Key 拆成兩半填入
        const p1 = "AIzaSyAZuOw6X4aK9GZ"; 
        const p2 = "hpBsW7rrq2o5sBYN8o_c";
        const API_KEY = p1 + p2;
        const PDF_FILENAME = "syllabus.pdf";
        // -------------------------

        const genAI = new GoogleGenerativeAI(API_KEY);
        let chat;
        let pdfPart = null;

        async function preparePdf() {
            try {
                const response = await fetch(PDF_FILENAME);
                if (!response.ok) throw new Error();
                const blob = await response.blob();
                const base64 = await new Promise(resolve => {
                    const reader = new FileReader();
                    reader.onloadend = () => resolve(reader.result.split(',')[1]);
                    reader.readAsDataURL(blob);
                });
                pdfPart = { inlineData: { data: base64, mimeType: "application/pdf" } };
                document.getElementById('loading-info').innerText = "課程大綱載入完成 ✅";
                document.getElementById('start-btn').disabled = false;
            } catch (err) {
                document.getElementById('loading-info').innerText = "❌ 錯誤：無法讀取 " + PDF_FILENAME;
            }
        }
        preparePdf();

        window.enterApp = () => {
            const name = document.getElementById('stu-name').value.trim();
            if (!name) return alert("請輸入姓名");

            document.getElementById('login-box').style.display = 'none';
            document.getElementById('chat-ui').style.display = 'flex';

            const model = genAI.getGenerativeModel({ 
                model: "gemini-3.1-pro-preview", 
                systemInstruction: `你是一位專業的教學助理。學生姓名是 ${name}。
                你已經收到了這份課程大綱 (syllabus.pdf)。
                請精確地根據大綱內容回答學生的問題，例如：評分標準、上課時間、教學目標等。
                若大綱未提及，請引導學生詢問教授。請務必使用繁體中文。`
            });

            chat = model.startChat({
                history: [
                    { role: "user", parts: [pdfPart, { text: "這是本學期的課程大綱，請讀取並準備回答問題。" }] },
                    { role: "model", parts: [{ text: "你好 " + name + "！我已讀完課程大綱。請問有什麼我可以幫你的嗎？" }] }
                ]
            });
            addMessage("ai", `你好 ${name}！我已經讀完課程大綱了。請問關於課程安排你有什麼想了解的嗎？`);
        };

        window.send = async () => {
            const inputField = document.getElementById('user-in');
            const btn = document.getElementById('send-btn');
            const text = inputField.value.trim();
            if (!text || btn.disabled) return;

            addMessage("user", text);
            inputField.value = "";
            btn.disabled = true;

            try {
                const result = await chat.sendMessage(text);
                addMessage("ai", result.response.text());
            } catch (error) {
                addMessage("ai", "連線錯誤：" + error.message);
            } finally {
                btn.disabled = false;
            }
        };

        function addMessage(role, text) {
            const container = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = `msg ${role}`;
            div.innerText = text;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }
    </script>
</body>
</html>
